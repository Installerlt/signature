<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Remonto darbų ir panaudotų medžiagų aktas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; padding:20px; }
    .container { max-width:650px; background:#fff; padding:20px; margin:auto; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    h2 { text-align:center; font-size:20px; margin-bottom:25px; }
    label { display:block; margin-top:15px; font-weight:bold; }
    input, textarea { width:100%; padding:10px; margin-top:5px; font-size:16px; box-sizing:border-box; }
    textarea { resize:vertical; }
    canvas { border:2px solid #000; width:100%; height:200px; margin-top:10px; touch-action:none; background:#fff; }
    .buttons { display:flex; gap:10px; margin-top:20px; }
    button { flex:1; padding:12px; font-size:16px; cursor:pointer; border:none; border-radius:5px; }
    .clear { background:#ccc; }
    .submit { background:#28a745; color:white; }
    .section-title { margin-top:30px; font-size:18px; border-bottom:1px solid #ddd; padding-bottom:5px; }
  </style>
</head>

<body>
<div class="container">

  <h2>Remonto darbų ir panaudotų medžiagų aktas</h2>

  <div class="section-title">Bendra informacija</div>

  <label>Darbo akto ID</label>
  <input type="text" id="work_id" placeholder="Pvz.: DA-2026-001" required>

  <label>Darbų atlikimo vieta</label>
  <input type="text" id="location" placeholder="Objekto adresas" required>

  <label>Užsakovo el. paštas</label>
  <input type="email" id="customer_email" placeholder="pvz.: klientas@email.lt" required>

  <label>Darbo pradžia</label>
  <input type="datetime-local" id="start_time" required>

  <label>Darbo pabaiga</label>
  <input type="datetime-local" id="end_time" required>

  <label>Bendras atstumas iki objekto (km)</label>
  <input type="number" id="distance" min="0" step="0.1" placeholder="Pvz.: 25" required>

  <div class="section-title">Atlikti darbai</div>

  <label>Atlikti remonto darbai</label>
  <textarea id="works" rows="4" required></textarea>

  <label>Panaudotos medžiagos</label>
  <textarea id="materials" rows="3" placeholder="Pvz.: varinis vamzdis 2 m, izoliacija, tvirtinimo detalės"></textarea>

  <div class="section-title">Užsakovo patvirtinimas</div>

  <label>Užsakovo vardas ir pavardė</label>
  <input type="text" id="customer_name" placeholder="Įveskite vardą ir pavardę" required>

  <label>Užsakovo parašas</label>
  <canvas id="signature"></canvas>

  <div class="buttons">
    <button type="button" class="clear" onclick="clearCanvas()">Išvalyti parašą</button>
    <button type="button" class="submit" onclick="submitForm()">Patvirtinti</button>
  </div>

</div>

<script>
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/br3u7f5ai8i59l3abogxdtvbjjvkpxnq";

const canvas = document.getElementById("signature");
const ctx = canvas.getContext("2d");

let drawing = false;
let hasSignature = false;

function resizeCanvas() {
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  const width = canvas.offsetWidth;
  const height = 200;

  canvas.width = width * ratio;
  canvas.height = height * ratio;
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#000";
}

window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

function getPosition(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches && e.touches.length ? e.touches[0] : null;

  return {
    x: (touch ? touch.clientX : e.clientX) - rect.left,
    y: (touch ? touch.clientY : e.clientY) - rect.top
  };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  hasSignature = true;

  const pos = getPosition(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!drawing) return;
  e.preventDefault();

  const pos = getPosition(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

function endDraw(e) {
  if (e) e.preventDefault();
  drawing = false;
  ctx.beginPath();
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mouseleave", endDraw);

canvas.addEventListener("touchstart", startDraw, { passive: false });
canvas.addEventListener("touchmove", draw, { passive: false });
canvas.addEventListener("touchend", endDraw, { passive: false });

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasSignature = false;
}

function formatDateTime(value) {
  if (!value) return "";
  return value.replace("T", " ");
}

function submitForm() {
  const data = {
    darbo_akto_id: document.getElementById("work_id").value.trim(),
    darbu_vieta: document.getElementById("location").value.trim(),
    uzsakovo_email: document.getElementById("customer_email").value.trim(),
    darbo_pradzia: formatDateTime(document.getElementById("start_time").value),
    darbo_pabaiga: formatDateTime(document.getElementById("end_time").value),
    atstumas_km: document.getElementById("distance").value.trim(),
    darbai: document.getElementById("works").value.trim(),
    medziagos: document.getElementById("materials").value.trim(),
    uzsakovo_vardas: document.getElementById("customer_name").value.trim(),
    parasas_base64: canvas.toDataURL("image/png"),
    akto_data: new Date().toLocaleDateString("lt-LT")
  };

  for (const key in data) {
    if (!data[key] && key !== "medziagos") {
      alert("Užpildykite visus privalomus laukus");
      return;
    }
  }

  if (!hasSignature) {
    alert("Užsakovas turi pasirašyti");
    return;
  }

  fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(function(response) {
    if (!response.ok) {
      throw new Error("Webhook klaida");
    }
    alert("Aktas išsiųstas PDF generavimui");
  })
  .catch(function(error) {
    alert("Nepavyko išsiųsti akto. Patikrinkite Make webhook arba interneto ryšį.");
    console.error(error);
  });
}
</script>
</body>
</html>
