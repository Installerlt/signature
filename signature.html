<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darbo akto pasirašymas</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 15px;
    }
    .container {
        background: #fff;
        padding: 15px;
        border-radius: 10px;
        max-width: 500px;
        margin: auto;
    }
    h2 {
        text-align: center;
    }
    canvas {
        border: 2px solid #000;
        width: 100%;
        height: 200px;
        touch-action: none;
    }
    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
    }
    .clear {
        background: #ccc;
    }
    .submit {
        background: #28a745;
        color: white;
    }
    .info {
        font-size: 14px;
        margin-bottom: 10px;
        text-align: center;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Darbo akto patvirtinimas</h2>
    <div class="info">
        Akto ID: <strong id="aktoId"></strong>
    </div>

    <canvas id="signature"></canvas>

    <button class="clear" onclick="clearCanvas()">Išvalyti parašą</button>
    <button class="submit" onclick="submitSignature()">Patvirtinti</button>
</div>

<script>
const canvas = document.getElementById('signature');
const ctx = canvas.getContext('2d');

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let drawing = false;

// Akto ID iš URL
const params = new URLSearchParams(window.location.search);
const aktoId = params.get('id') || 'NENURODYTAS';
document.getElementById('aktoId').innerText = aktoId;

// Piešimas
function start(e) {
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(getX(e), getY(e));
}

function draw(e) {
    if (!drawing) return;
    ctx.lineTo(getX(e), getY(e));
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.stroke();
}

function stop() {
    drawing = false;
}

function getX(e) {
    return (e.touches ? e.touches[0].clientX : e.clientX) - canvas.getBoundingClientRect().left;
}

function getY(e) {
    return (e.touches ? e.touches[0].clientY : e.clientY) - canvas.getBoundingClientRect().top;
}

// Eventai
canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stop);
canvas.addEventListener('touchstart', start);
canvas.addEventListener('touchmove', draw);
canvas.addEventListener('touchend', stop);

// Išvalyti
function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Siuntimas į Make
function submitSignature() {
    const imageData = canvas.toDataURL('image/png');

    fetch('https://hook.make.com/TAVO_WEBHOOK_URL', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            akto_id: aktoId,
            signature: imageData,
            date: new Date().toISOString()
        })
    })
    .then(() => {
        alert('Ačiū! Darbo aktas pasirašytas.');
    })
    .catch(() => {
        alert('Klaida siunčiant parašą.');
    });
}
</script>

</body>
</html>
